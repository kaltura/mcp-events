name: mcp-events

# Prerequisites:
#   - KALTURA_KS is read from tests/.env (already present); override by exporting it.
#   - Ensure your LiteLLM proxy is running at host port 10006 (used by the tests).
#
# Usage (run from the tests/ directory):
#   docker compose up --build           # run all 4 steps in order
#   docker compose up mcp-server        # start only the MCP server
#   docker compose run --rm test-runner # re-run tests against a running server

services:

  # ── Step 1: MCP Events HTTP server ──────────────────────────────────────────
  mcp-server:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["node", "dist/mcp-server/src/http.js"]
    ports:
      - "3000:3000"
    environment:
      KALTURA_KS: ${KALTURA_KS}
      KALTURA_ENV: ${KALTURA_ENV:-NVP}
      KALTURA_SERVER_PORT: 3000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  # ── Steps 2 & 3: Register server in Claude Code and verify connection ────────
  claude-setup:
    build:
      context: docker
      dockerfile: Dockerfile.claude
    depends_on:
      mcp-server:
        condition: service_healthy
    volumes:
      - ${HOME}/.claude:/root/.claude
    environment:
      KALTURA_KS: ${KALTURA_KS}

  # ── Step 4: Run pytest test suite ───────────────────────────────────────────
  test-runner:
    image: python:3.11-slim
    depends_on:
      claude-setup:
        condition: service_completed_successfully
    volumes:
      - .:/tests
    working_dir: /tests
    env_file:
      - .env
    environment:
      # Override tests/.env values that are not reachable from inside Docker
      MCP_SERVER_URL: http://mcp-server:3000/mcp
      ANTHROPIC_BASE_URL: http://host.docker.internal:10006
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "pip install -r requirements.freezed -q && pytest -v"