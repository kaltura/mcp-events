openapi: 3.0.0
paths:
  /api/v1/events/create:
    post:
      operationId: create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequestDto"
      responses:
        "200":
          description: Event created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventResponseDto"
              example:
                event:
                  id: 1
                  publicDomain: example.com
                  name: Sample Event
                  description: This is a sample event description.
                  startDate: 2023-10-01T00:00:00Z
                  endDate: 2023-10-02T00:00:00Z
                  timezone: UTC
                  logoUrl: https://example.com/logo.png
                  bannerImageUrl: https://example.com/banner.png
                  labels:
                    - label1
                    - label2
                  createdAt: 2023-09-01T00:00:00Z
                  updatedAt: 2023-09-02T00:00:00Z
                  languages:
                    - en
                    - fr
                  isRegistrationOpen: true
                  doorsOpenDate: 2023-10-01T08:00:00Z
                  templateId: tm1000
                  templateName: Interactive session
                status: ok
      security:
        - ks: []
      summary: Creates a new virtual event with provided configuration including name,
        start/end dates, templates, and timezone settings
      tags: &a1
        - Events
  /api/v1/events/delete:
    post:
      operationId: delete
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteEventRequestDto"
      responses:
        "200":
          description: Event deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEventResponseDto"
              example:
                event:
                  id: 1
                  publicDomain: example.com
                  name: Sample Event
                  description: This is a sample event description.
                  startDate: 2023-10-01T00:00:00Z
                  endDate: 2023-10-02T00:00:00Z
                  timezone: UTC
                  logoUrl: https://example.com/logo.png
                  bannerImageUrl: https://example.com/banner.png
                  labels:
                    - label1
                    - label2
                  createdAt: 2023-09-01T00:00:00Z
                  updatedAt: 2023-09-02T00:00:00Z
                  languages:
                    - en
                    - fr
                  isRegistrationOpen: true
                  doorsOpenDate: 2023-10-01T08:00:00Z
                  templateId: tm1000
                  templateName: Interactive session
                status: ok
      security:
        - ks: []
      summary: Permanently removes an event by its ID, including all associated
        resources and configurations
      tags: *a1
  /api/v1/events/list:
    post:
      operationId: list
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListEventRequestDto"
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventResponseDto"
              example:
                events:
                  - id: 1
                    publicDomain: example.com
                    name: Sample Event
                    description: This is a sample event description.
                    startDate: 2023-10-01T00:00:00Z
                    endDate: 2023-10-02T00:00:00Z
                    timezone: UTC
                    logoUrl: https://example.com/logo.png
                    bannerImageUrl: https://example.com/banner.png
                    labels:
                      - label1
                      - label2
                    createdAt: 2023-09-01T00:00:00Z
                    updatedAt: 2023-09-02T00:00:00Z
                    languages:
                      - en
                      - fr
                    isRegistrationOpen: true
                    doorsOpenDate: 2023-10-01T08:00:00Z
                    templateId: tm1000
                    templateName: Interactive session
                totalCount: 1
                status: ok
      security:
        - ks: []
      summary: Retrieves a paginated list of events with filtering and sorting options
        to manage large event catalogs
      tags: *a1
  /api/v1/events/update:
    post:
      operationId: update
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventRequestDto"
      responses:
        "200":
          description: Event updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEventResponseDto"
              example:
                event:
                  id: 1
                  publicDomain: example.com
                  name: Sample Event
                  description: This is a sample event description.
                  startDate: 2023-10-01T00:00:00Z
                  endDate: 2023-10-02T00:00:00Z
                  timezone: UTC
                  logoUrl: https://example.com/logo.png
                  bannerImageUrl: https://example.com/banner.png
                  labels:
                    - label1
                    - label2
                  createdAt: 2023-09-01T00:00:00Z
                  updatedAt: 2023-09-02T00:00:00Z
                  languages:
                    - en
                    - fr
                  isRegistrationOpen: true
                  doorsOpenDate: 2023-10-01T08:00:00Z
                  templateId: tm1000
                  templateName: Interactive session
                status: ok
      security:
        - ks: []
      summary: Modifies an existing event's properties such as name, dates, banner,
        logo, and other configuration settings
      tags: *a1
  /api/v1/events/duplicate:
    post:
      operationId: duplicate
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DuplicateEventRequestDto"
      responses:
        "200":
          description: Event duplication initiated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateEventResponseDto"
              example:
                jobId: 1234567890abcdef
                status: ok
      security:
        - ks: []
      summary: Creates a copy of an existing event with all its configurations,
        returning a job ID to track the duplication process
      tags: *a1
  /api/v1/events/duplicateStatus:
    post:
      operationId: duplicateStatus
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DuplicateStatusEventRequestDto"
      responses:
        "200":
          description: Event duplication status retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateStatusEventResponseDto"
              example:
                jobId: 1234567890abcdef
                jobState: completed
                eventId: abcdef1234567890
                status: ok
      security:
        - ks: []
      summary: Checks the status of an event duplication job, returning job state and
        new event ID when complete
      tags: *a1
  /api/v1/sessions/create:
    post:
      operationId: create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequestDto"
      responses:
        "200":
          description: Session created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionResponseDto"
              example:
                session:
                  id: 0_4q5ie48b
                  createdAt: 2024-01-01T12:00:00Z
                  updatedAt: 2024-01-02T12:00:00Z
                  name: Sample Session
                  description: This is a sample session description.
                  startDate: 2024-02-01T10:00:00Z
                  endDate: 2024-02-01T11:00:00Z
                  tags:
                    - QA
                    - Workshop
                  rsvpCount: 150
                  type: MeetingEntry
                  visibility: published
                  thumbnailUrl: https://example.com/thumbnail.png
                status: ok
      security:
        - ks: []
      summary: Creates a new session under the specified event with the provided
        configuration
      tags: &a2
        - Sessions
  /api/v1/sessions/list:
    post:
      operationId: list
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListSessionRequestDto"
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSessionResponseDto"
              example:
                sessions:
                  - id: 0_4q5ie48b
                    createdAt: 2024-01-01T12:00:00Z
                    updatedAt: 2024-01-02T12:00:00Z
                    name: Sample Session
                    description: This is a sample session description.
                    startDate: 2024-02-01T10:00:00Z
                    endDate: 2024-02-01T11:00:00Z
                    tags:
                      - QA
                      - Workshop
                    rsvpCount: 150
                    type: MeetingEntry
                    visibility: published
                    thumbnailUrl: https://example.com/thumbnail.png
                status: ok
      security:
        - ks: []
      summary: Retrieves a list of all sessions of a specified event
      tags: *a2
  /api/v1/sessions/speakerList:
    post:
      operationId: speakerList
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpeakerListRequestDto"
      responses:
        "200":
          description: List of event session speakers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpeakerListResponseDto"
              example:
                speakers:
                  - id: speaker_12345
                    email: john@company.com
                    order: 1
                    isHidden: false
                    firstName: John
                    lastName: Doe
                    profileLink: https://company.com/johndoe
                    title: Senior Developer
                    bio: John has over 10 years of experience in software development.
                    thumbnailUrl: https://example.com/speaker_thumbnail.png
                status: ok
      security:
        - ks: []
      summary: Retrieves a list of an event session speakers
      tags: *a2
  /api/v1/team-members/create:
    post:
      operationId: create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequestDto"
      responses:
        "200":
          description: Created team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTeamResponseDto"
              example:
                status: ok
                teamMember:
                  id: user_123456
                  firstName: John
                  lastName: Doe
                  email: john@example.com
                  disabled: false
      security:
        - ks: []
      summary: Creates a new Event Platform team member
      tags: &a3
        - Team members
  /api/v1/team-members/update:
    post:
      operationId: update
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamRequestDto"
      responses:
        "200":
          description: Updated team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTeamResponseDto"
              example:
                status: ok
                teamMember:
                  id: user_123456
                  firstName: John
                  lastName: Doe
                  email: john@example.com
                  disabled: false
      security:
        - ks: []
      summary: Updates an Event Platform team member
      tags: *a3
  /api/v1/team-members/delete:
    post:
      operationId: delete
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteTeamRequestDto"
      responses:
        "200":
          description: Deleted team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTeamResponseDto"
              example:
                status: ok
      security:
        - ks: []
      summary: Deletes an Event Platform team member
      tags: *a3
  /api/v1/team-members/list:
    post:
      operationId: list
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListTeamRequestDto"
      responses:
        "200":
          description: List of team members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTeamResponseDto"
              example:
                totalCount: 1
                status: ok
                teamMembers:
                  - id: user_123456
                    firstName: John
                    lastName: Doe
                    email: john@example.com
                    disabled: false
      security:
        - ks: []
      summary: Retrieves a list of Event Platform team members
      tags: *a3
  /api/v1/event-users/invite:
    post:
      operationId: invite
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteEventUserRequestDto"
      responses:
        "200":
          description: User invited successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteEventUserResponseDto"
              example:
                user:
                  id: 1ef91ea60970881d430d4c6658eb8dba12a25e6083037b594a1871d129dd32b9
                  firstName: Jane
                  lastName: Doe
                  email: jane@example.com
                  title: VP Engineering
                  company: Acme Corp
                  bio: Speaker bio text
                  roles:
                    - Speaker
                  thumbnailUrl: https://cdn.kaltura.com/p/999/thumbnail/entry_id/1_p9ek1ngh/height/173/width/173
                  createdAt: 2025-01-01T10:00:00.000Z
                  updatedAt: 2025-01-02T10:00:00.000Z
                  status: Invited
                status: ok
      security:
        - ks: []
      summary: Invites a user to the event with the specified roles and profile data
      tags: &a4
        - Event Users
  /api/v1/event-users/list:
    post:
      operationId: list
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListEventUserRequestDto"
      responses:
        "200":
          description: List of event users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventUserResponseDto"
              example:
                users:
                  - id: 1ef91ea60970881d430d4c6658eb8dba12a25e6083037b594a1871d129dd32b9
                    firstName: Jane
                    lastName: Doe
                    email: jane@example.com
                    title: VP Engineering
                    company: Acme Corp
                    bio: Speaker bio text
                    roles:
                      - Speaker
                    thumbnailUrl: https://cdn.kaltura.com/p/999/thumbnail/entry_id/1_p9ek1ngh/height/173/width/173
                    createdAt: 2025-01-01T10:00:00.000Z
                    updatedAt: 2025-01-02T10:00:00.000Z
                    status: Invited
                totalCount: 1
                status: ok
      security:
        - ks: []
      summary: Returns a paginated list of event users with optional filtering and
        sorting
      tags: *a4
  /api/v1/event-users/update:
    post:
      operationId: update
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventUserRequestDto"
      responses:
        "200":
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateEventUserResponseDto"
              example:
                user:
                  id: 1ef91ea60970881d430d4c6658eb8dba12a25e6083037b594a1871d129dd32b9
                  firstName: Jane
                  lastName: Doe
                  email: jane@example.com
                  title: VP Engineering
                  company: Acme Corp
                  bio: Speaker bio text
                  roles:
                    - Speaker
                  thumbnailUrl: https://cdn.kaltura.com/p/999/thumbnail/entry_id/1_p9ek1ngh/height/173/width/173
                  createdAt: 2025-01-01T10:00:00.000Z
                  updatedAt: 2025-01-02T10:00:00.000Z
                  status: Invited
                status: ok
      security:
        - ks: []
      summary: Updates an event user profile and roles (role updates are additive only)
      tags: *a4
  /api/v1/event-users/delete:
    post:
      operationId: delete
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteEventUserRequestDto"
      responses:
        "200":
          description: User removed from event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEventUserResponseDto"
              example:
                status: ok
      security:
        - ks: []
      summary: Removes a user from the event context including their session roles and
        groups
      tags: *a4
  /api/v1/session-participants/add:
    post:
      operationId: add
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSessionParticipantsRequestDto"
            examples:
              example:
                value:
                  eventId: 98765
                  sessionId: 0_syswy6uj
                  speakers:
                    - userId: 1ef91ea60970881d430d4c6658eb8dba12a25e6083037b594a1871d129dd32b9
                      order: 1
                      isHidden: false
                      role: advancedSpeaker
                    - userId: abc123def456abc123def456abc123def456abc123def456abc123def456abc1
                      order: 2
                      isHidden: false
                      role: simpleSpeaker
                  moderatorIds:
                    - def789abc012def789abc012def789abc012def789abc012def789abc012def7
      responses:
        "200":
          description: Participants added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddSessionParticipantsResponseDto"
              example:
                status: ok
      security:
        - ks: []
      summary: Adds speakers and/or moderators to a session (users must have
        event-level Speaker/Moderator role)
      tags: &a5
        - Session Participants
  /api/v1/session-participants/remove:
    post:
      operationId: remove
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemoveSessionParticipantsRequestDto"
      responses:
        "200":
          description: Participants removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveSessionParticipantsResponseDto"
              example:
                status: ok
      security:
        - ks: []
      summary: Removes speakers and/or moderators from a session
      tags: *a5
  /api/v1/session-participants/update:
    post:
      operationId: update
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionParticipantsRequestDto"
            examples:
              example:
                value:
                  eventId: 98765
                  sessionId: 0_syswy6uj
                  speakers:
                    - userId: 1ef91ea60970881d430d4c6658eb8dba12a25e6083037b594a1871d129dd32b9
                      role: advancedSpeaker
                    - userId: abc123def456abc123def456abc123def456abc123def456abc123def456abc1
                      order: 2
                      isHidden: false
      responses:
        "200":
          description: Participants updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSessionParticipantsResponseDto"
              example:
                status: ok
      security:
        - ks: []
      summary: Updates properties of speakers already assigned to a session (role,
        order, visibility)
      tags: *a5
  /api/v1/session-participants/list:
    post:
      operationId: list
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListSessionParticipantsRequestDto"
      responses:
        "200":
          description: Session participants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSessionParticipantsResponseDto"
              example:
                speakers:
                  - id: 1ef91ea60970881d430d4c6658eb8dba12a25e6083037b594a1871d129dd32b9
                    firstName: Jane
                    lastName: Doe
                    email: jane@example.com
                    title: VP Engineering
                    bio: Speaker bio
                    thumbnailUrl: https://cdn.kaltura.com/thumbnail.jpg
                    type: speaker
                    order: 1
                    isHidden: false
                    sessionRole: simpleSpeaker
                moderators:
                  - id: abc123def456abc123def456abc123def456abc123def456abc123def456abc1
                    firstName: John
                    lastName: Smith
                    email: john@example.com
                    type: moderator
                status: ok
      security:
        - ks: []
      summary: Lists all speakers and moderators for a session
      tags: *a5
  /metrics:
    get:
      operationId: index
      parameters: []
      responses:
        "200":
          description: ""
      tags:
        - Prometheus
info:
  title: Kaltura Event Platform 🌍 Public API
  description: ""
  version: 1.1.2
  contact: {}
tags:
  - name: Events
    description: 🎉 Event Management
  - name: Team members
    description: 👥 Event Platform Team Members
  - name: Sessions
    description: 🕒 Event Sessions
servers:
  - url: http://localhost:3001
  - url: https://events-api.nvq2.ovp
  - url: https://events-api.nvp1.ovp.kaltura.com
  - url: https://events-api.irp2.ovp.kaltura.com
  - url: https://events-api.frp2.ovp.kaltura.com
components:
  securitySchemes:
    ks:
      scheme: bearer
      bearerFormat: KS
      type: http
  schemas:
    CreateEventRequestDto:
      type: object
      properties:
        templateId:
          type: string
          description: Kaltura Event Template ID
          example: 507f1f77bcf86cd799439011
        name:
          type: string
          description: Event Name
          example: Virtual Townhall 2025
        description:
          type: string
          description: Event Description
          example: Annual company-wide update
        startDate:
          type: string
          description: Event Start Date
          example: 2025-05-01T14:00:00Z
        endDate:
          type: string
          description: Event End Date
          example: 2025-05-01T16:00:00Z
        timezone:
          type: string
          description: Event Timezone
          example: America/New_York
      required:
        - templateId
        - name
        - startDate
        - endDate
        - timezone
    PublicEventDto:
      type: object
      properties:
        id:
          type: number
          description: Unique identifier for the event
        publicDomain:
          type: string
          description: Public domain of the event
        name:
          type: string
          description: Name of the event
        description:
          type: string
          description: Description of the event
        startDate:
          type: string
          description: Start date of the event (ISO string)
        endDate:
          type: string
          description: End date of the event (ISO string)
        timezone:
          type: string
          description: Timezone of the event
        logoUrl:
          type: string
          description: URL of the event logo
        bannerImageUrl:
          type: string
          description: URL of the event banner image
        labels:
          description: Labels associated with the event
          type: array
          items:
            type: string
        createdAt:
          type: string
          description: Creation timestamp (ISO string)
        updatedAt:
          type: string
          description: Last update timestamp (ISO string)
        languages:
          description: Supported languages for the event
          type: array
          items:
            type: string
        isRegistrationOpen:
          type: boolean
          description: Indicates if registration is open
        doorsOpenDate:
          type: string
          description: Date when doors open (ISO string)
        templateId:
          type: string
          description: Template ID used for the event, custom or preset
        templateName:
          type: string
          description: Template description for the event
      required:
        - id
        - publicDomain
        - name
        - description
        - startDate
        - endDate
        - timezone
        - logoUrl
        - bannerImageUrl
        - labels
        - createdAt
        - updatedAt
        - languages
        - isRegistrationOpen
        - doorsOpenDate
        - templateId
        - templateName
    CreateEventResponseDto:
      type: object
      properties:
        event:
          description: Created event details
          example: &a6
            id: 1
            publicDomain: example.com
            name: Sample Event
            description: This is a sample event description.
            startDate: 2023-10-01T00:00:00Z
            endDate: 2023-10-02T00:00:00Z
            timezone: UTC
            logoUrl: https://example.com/logo.png
            bannerImageUrl: https://example.com/banner.png
            labels:
              - label1
              - label2
            createdAt: 2023-09-01T00:00:00Z
            updatedAt: 2023-09-02T00:00:00Z
            languages:
              - en
              - fr
            isRegistrationOpen: true
            doorsOpenDate: 2023-10-01T08:00:00Z
            templateId: tm1000
            templateName: Interactive session
          allOf:
            - $ref: "#/components/schemas/PublicEventDto"
        status:
          type: string
          description: Status of the request
          enum:
            - ok
            - Forbidden
            - InvalidArgument
            - RateLimitReached
            - OperationNotAllowed
